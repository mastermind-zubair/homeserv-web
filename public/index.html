<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="AI powered job management software" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
      integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm"
      crossorigin="anonymous"
    />
    <!-- <link rel="stylesheet" type="text/css" href="css/bootstrap.css" /> -->
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:400,700"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:300%2C500%2C600%7CRoboto:400&display=swap"
      rel="stylesheet"
    />

    <title>Service Vault</title>
    <style>
      .loader {
        z-index: "10000";
        position: absolute;
        top: calc(50% - 4em);
        left: calc(50% - 4em);
        width: 6em;
        height: 6em;
        border: 1.1em solid rgba(0, 0, 0, 0.1);
        border-left: 1.1em solid #1c78bc;
        border-radius: 50%;
        animation: load8 1.1s infinite linear;
        transition: opacity 0.3s;
      }

      .loader--hide {
        opacity: 0;
      }

      @keyframes load8 {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="https://js.pusher.com/7.0/pusher.min.js"></script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div class="loader"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <script>
      var map_loaded = false;
      function initMap(ele) {
        map_loaded = true;
        console.log("map loaded with real time data");
      }
      function displayMap(
        ele,
        center,
        zoom,
        markers,
        { handleZoomChanged, handleCenterChanged }
      ) {
        try {
          if (!map_loaded) {
            console.log("map is not loaded.");
            return null;
          }

          const map = new google.maps.Map(ele, {
            zoom,
            center,
          });
          if (handleZoomChanged)
            map.addListener("zoom_changed", handleZoomChanged);
          if (handleCenterChanged)
            map.addListener("center_changed", handleCenterChanged);

          markers.forEach((v) => {
            const marker = new google.maps.Marker({
              position: { lat: +v.position.lat, lng: +v.position.lng },
              map: map,
              label: v.jobs.toString(),

              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 10,
                fillColor: "#F00",
                fillOpacity: 0.5,
                strokeWeight: 0.4,
              },
            });
          });

          return map;
        } catch (err) {
          console.log(`display map having error: ${err}`);
        }
      }

      // iframe.onload = function () {
      //   iframe.style.height = iframe.contentWindow.document.body.scrollHeight + "px";
      // };
    </script>
    <script
      async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA5Lq615vXza-fMv8kf6AQ493XGPZRp4Jc&callback=initMap"
    ></script>
  </body>
</html>
